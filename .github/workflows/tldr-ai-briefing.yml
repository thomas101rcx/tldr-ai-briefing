name: TLDR AI Briefing

on:
  workflow_dispatch:
  schedule:
    # 7:00 AM PST (UTC-8). If you want 7:00 AM local Pacific time year-round,
    # add a second cron for PDT or handle DST in-script.
    - cron: "0 15 * * *"

jobs:
  build-briefing:
    runs-on: ubuntu-latest

    env:
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TLDR_FROM_CONTAINS: ${{ secrets.TLDR_FROM_CONTAINS }}
      TLDR_SUBJECT_CONTAINS: ${{ secrets.TLDR_SUBJECT_CONTAINS }}
      OUTPUT_DIR: output

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate briefing
        run: python tldr_ai_briefing.py

      - name: Upload briefing artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tldr-ai-briefing-${{ github.run_id }}
          path: output/
