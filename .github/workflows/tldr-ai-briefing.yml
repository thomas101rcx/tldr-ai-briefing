name: TLDR AI Briefing

on:
  workflow_dispatch:
  schedule:
    # Weekdays only at 15:00 UTC.
    # This is 7:00 AM PST in standard time and 8:00 AM PDT in daylight time.
    - cron: "0 14 * * 1-5"

jobs:
  build-briefing:
    runs-on: ubuntu-latest

    env:
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
      TLDR_FROM_CONTAINS: ${{ secrets.TLDR_FROM_CONTAINS }}
      TLDR_SUBJECT_CONTAINS: ${{ secrets.TLDR_SUBJECT_CONTAINS }}
      OUTPUT_DIR: output

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate briefing
        run: python tldr_ai_briefing.py

      - name: Upload briefing artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tldr-ai-briefing-${{ github.run_id }}
          path: output/
